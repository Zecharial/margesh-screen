<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>מרכז רגש</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--pink:#cc1f5f;--pink-2:#e24a85;--green:#97bf2e;--green-2:#b2d24a;--teal:#16a7c2;--teal-2:#45c3da;--ink:#2a2140;}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden;background:#000;font-family:'Heebo',sans-serif}
#screen{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center}
#frame{position:relative;width:min(100vw,177.78vh);height:min(56.25vw,100vh);container-type:size;overflow:hidden;background:#fff}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:7cqw 8cqw 12cqh;opacity:0;transition:opacity 1s ease;overflow:hidden}
.slide.active{opacity:1;z-index:2}
.theme-pink{background:radial-gradient(120% 120% at 80% 0%,var(--pink-2),var(--pink));color:#fff}
.theme-green{background:radial-gradient(120% 120% at 80% 0%,var(--green-2),var(--green));color:#fff}
.theme-teal{background:radial-gradient(120% 120% at 80% 0%,var(--teal-2),var(--teal));color:#fff}
.theme-light{background:#fff;color:var(--ink)}.theme-light .title{color:var(--pink)}.theme-light .eyebrow{color:var(--teal)}.theme-light .cta{background:var(--pink);color:#fff}
.eyebrow{font-family:'Fredoka';font-size:2.6cqw;font-weight:600;margin-bottom:2.2cqh;opacity:.95}
.title{font-family:'Fredoka','Heebo';font-size:6.2cqw;font-weight:700;line-height:1.1;margin-bottom:3cqh;max-width:92%;text-shadow:0 .4cqh 1.4cqh rgba(0,0,0,.12)}
.body{font-size:2.7cqw;line-height:1.45;max-width:80%;opacity:.97}
.cta{margin-top:5.5cqh;display:inline-flex;align-items:center;gap:1cqw;font-size:2.9cqw;font-weight:800;direction:ltr;background:#fff;color:var(--pink);padding:1.6cqh 4.5cqw;border-radius:999px;box-shadow:0 1.4cqh 4cqh rgba(0,0,0,.22)}
.theme-pink .cta{color:var(--pink)}.theme-green .cta{color:var(--green)}.theme-teal .cta{color:var(--teal)}
.slide .eyebrow,.slide .title,.slide .body,.slide .cta{opacity:0;transform:translateY(4cqh);transition:opacity .9s ease,transform .9s ease}
.slide.active .eyebrow{opacity:1;transform:none;transition-delay:.3s}.slide.active .title{opacity:.999;transform:none;transition-delay:.55s}
.slide.active .body{opacity:1;transform:none;transition-delay:.85s}.slide.active .cta{opacity:1;transform:none;transition-delay:1.15s}
.hearts{position:absolute;inset:0;pointer-events:none;z-index:-1;overflow:hidden}
.hearts svg{position:absolute;opacity:.16;animation:float linear infinite}
@keyframes float{0%{transform:translateY(8cqh) rotate(-8deg)}50%{transform:translateY(-6cqh) rotate(8deg)}100%{transform:translateY(8cqh) rotate(-8deg)}}
#logo{position:absolute;top:4cqh;left:3cqw;z-index:60;height:15cqh;background:rgba(255,255,255,.92);padding:1.4cqh 1.6cqw;border-radius:1.6cqh;filter:drop-shadow(0 .6cqh 1.8cqh rgba(0,0,0,.18))}
#progress{position:absolute;bottom:0;left:0;right:0;height:.7cqh;background:rgba(0,0,0,.08);z-index:50}#bar{height:100%;width:0;background:rgba(255,255,255,.9)}
.on-light #bar{background:var(--pink)}
#footer{position:absolute;bottom:0;left:0;right:0;z-index:40;display:flex;align-items:center;justify-content:space-between;padding:1.8cqh 3cqw;color:#fff;font-weight:600;font-size:2cqw;background:linear-gradient(0deg,rgba(0,0,0,.18),transparent)}
.on-light #footer{color:var(--ink)}#tagline{font-family:'Fredoka';display:flex;align-items:center;gap:.8cqw}#clock{font-variant-numeric:tabular-nums;opacity:.92}
</style></head><body>
