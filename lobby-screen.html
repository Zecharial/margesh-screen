<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מרכז רגש — מצגת מסכי המתנה</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">

<style>
/* =========================================================================
   🎨  שפת המותג של מרכז רגש — צבעים מתוך הלוגו
   ========================================================================= */
:root{
  --pink:   #cc1f5f;
  --pink-2: #e24a85;
  --green:  #97bf2e;
  --green-2:#b2d24a;
  --teal:   #16a7c2;
  --teal-2: #45c3da;
  --ink:    #2a2140;
  --slide-seconds: 9;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#000;font-family:'Heebo',sans-serif;}

/* ---- מסך מלא עם במה נעולה ל-16:9 (פסים שחורים רק אם המסך אינו 16:9) ---- */
#screen{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;}
#frame{
  position:relative;
  width:min(100vw, 177.78vh);   /* 16/9 */
  height:min(56.25vw, 100vh);   /* 9/16 */
  container-type:size;          /* כל היחידות cqw/cqh יחסיות לבמה הזו */
  overflow:hidden;background:#fff;
}

/* ---- שקף ---- */
.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:7cqw 8cqw 12cqh;
  opacity:0;transition:opacity 1s ease;overflow:hidden;
}
.slide.active{opacity:1;z-index:2;}

.theme-pink {background:radial-gradient(120% 120% at 80% 0%, var(--pink-2), var(--pink));color:#fff;}
.theme-green{background:radial-gradient(120% 120% at 80% 0%, var(--green-2), var(--green));color:#fff;}
.theme-teal {background:radial-gradient(120% 120% at 80% 0%, var(--teal-2), var(--teal));color:#fff;}
.theme-light{background:#fff;color:var(--ink);}
.theme-light .title{color:var(--pink);}
.theme-light .eyebrow{color:var(--teal);}
.theme-light .cta{background:var(--pink);color:#fff;}
.theme-light .body{color:var(--ink);}

.eyebrow{font-family:'Fredoka',sans-serif;font-size:2.6cqw;font-weight:600;
  letter-spacing:.02em;margin-bottom:2.2cqh;opacity:.95;}
.title{font-family:'Fredoka','Heebo',sans-serif;font-size:6.2cqw;font-weight:700;line-height:1.1;
  margin-bottom:3cqh;max-width:92%;text-shadow:0 0.4cqh 1.4cqh rgba(0,0,0,.12);}
.body{font-size:2.7cqw;font-weight:400;line-height:1.45;max-width:80%;opacity:.97;}
.cta{margin-top:5.5cqh;display:inline-flex;align-items:center;gap:1cqw;
  font-size:2.9cqw;font-weight:800;direction:ltr;
  background:#fff;color:var(--pink);padding:1.6cqh 4.5cqw;border-radius:999px;
  box-shadow:0 1.4cqh 4cqh rgba(0,0,0,.22);}
.cta .label{font-family:'Heebo';font-weight:800;}
.theme-pink .cta{color:var(--pink);}
.theme-green .cta{color:var(--green);}
.theme-teal .cta{color:var(--teal);}

/* אנימציית כניסה */
.slide .eyebrow,.slide .title,.slide .body,.slide .cta{
  opacity:0;transform:translateY(4cqh);transition:opacity .9s ease,transform .9s ease;}
.slide.active .eyebrow{opacity:1;transform:none;transition-delay:.3s;}
.slide.active .title  {opacity:.999;transform:none;transition-delay:.55s;}
.slide.active .body   {opacity:1;transform:none;transition-delay:.85s;}
.slide.active .cta    {opacity:1;transform:none;transition-delay:1.15s;}

/* לבבות מרחפים */
.hearts{position:absolute;inset:0;pointer-events:none;z-index:-1;overflow:hidden;}
.hearts svg{position:absolute;opacity:.16;animation:float linear infinite;}
@keyframes float{
  0%{transform:translateY(8cqh) rotate(-8deg);}
  50%{transform:translateY(-6cqh) rotate(8deg);}
  100%{transform:translateY(8cqh) rotate(-8deg);}
}

/* לוגו קבוע בפינה השמאלית-עליונה */
#logo{position:absolute;top:4cqh;left:3cqw;z-index:60;height:15cqh;width:auto;
  filter:drop-shadow(0 0.6cqh 1.8cqh rgba(0,0,0,.18));
  background:rgba(255,255,255,.92);padding:1.4cqh 1.6cqw;border-radius:1.6cqh;}

/* פס התקדמות */
#progress{position:absolute;bottom:0;left:0;right:0;height:0.7cqh;background:rgba(0,0,0,.08);z-index:50;}
#bar{height:100%;width:0;background:rgba(255,255,255,.9);}
.on-light #bar{background:var(--pink);}

/* כותרת תחתונה */
#footer{position:absolute;bottom:0;left:0;right:0;z-index:40;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.8cqh 3cqw;color:#fff;font-weight:600;font-size:2cqw;
  background:linear-gradient(0deg, rgba(0,0,0,.18), transparent);}
.on-light #footer{color:var(--ink);}
#tagline{font-family:'Fredoka';display:flex;align-items:center;gap:.8cqw;}
#clock{font-variant-numeric:tabular-nums;opacity:.92;}
</style>
</head>
<body>
<div id="screen">
  <div id="frame">
    <img id="logo" src="logo.png" alt="מרכז רגש">
    <div id="stage"></div>
    <div id="progress"><div id="bar"></div></div>
    <div id="footer">
      <div id="tagline">💚 ילדים שאוהבים באמת</div>
      <div id="clock"></div>
    </div>
  </div>
</div>

<script>
/* =========================================================================
   ✏️  כאן עורכים! רק את החלק הזה.
   ========================================================================= */

/* כל אובייקט = שקף אחד. שדות:
     theme    - "pink" / "green" / "teal" / "light"  (ריק = מתחלף לבד)
     eyebrow  - כותרת קטנה למעלה
     title    - הכותרת הגדולה
     body     - טקסט הסבר
     cta      - קריאה לפעולה (טלפון / אתר / "פנו לדלפק")
     seconds  - כמה שניות להציג (ברירת מחדל 9)
*/
const SLIDES = [
  {
    theme:   "pink",
    eyebrow: "ברוכים הבאים למרכז רגש",
    title:   "ילדים שאוהבים באמת",
    body:    "מרכז התפתחות, טיפול וליווי למשפחות — כאן בשבילכם ובשביל הילדים.",
    seconds: 7
  },
  {
    theme:   "teal",
    eyebrow: "כדאי לדעת",
    title:   "ייתכן ומגיע לכם כסף מהביטוח הלאומי",
    body:    "הורים לילדים עם בעיות שפה, התנהגות או עיכוב התפתחותי עשויים להיות זכאים לקצבה מהביטוח הלאומי. מחלקת הזכויות שלנו כאן לרשותכם בטלפון ובוואטסאפ:",
    cta:     "073-3797077",
    seconds: 11
  },
  {
    theme:   "green",
    eyebrow: "מחלקת הזכויות של מרכז רגש",
    title:   "לא יודעים אם אתם זכאים? נבדוק יחד",
    body:    "בדיקת זכאות חינם, ליווי אישי בתהליך מול הביטוח הלאומי — בלי בירוקרטיה מסובכת.",
    cta:     "073-3797077",
    seconds: 9
  }
];

/* =========================================================================
   ⬇️  מנוע — אין צורך לגעת מכאן והלאה.
   ========================================================================= */
const THEMES=["pink","green","teal"];
const stage=document.getElementById('stage');
const bar=document.getElementById('bar');
const DEF=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--slide-seconds'))||9;

document.getElementById('logo').addEventListener('error',e=>{e.target.style.display='none';});

function tick(){const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});}
setInterval(tick,1000);tick();

function heartsLayer(){
  const wrap=document.createElement('div');wrap.className='hearts';
  for(let k=0;k<6;k++){
    const s=2+(k%3)*1.6;
    const ns='http://www.w3.org/2000/svg';
    const svg=document.createElementNS(ns,'svg');
    svg.setAttribute('viewBox','0 0 24 24');
    svg.setAttribute('width',(s*1.2)+'cqw');svg.setAttribute('height',(s*1.2)+'cqw');
    const p=document.createElementNS(ns,'path');
    p.setAttribute('d','M12 21s-7.5-4.7-10-9.3C.3 8.4 2 5 5.2 5c2 0 3.2 1.1 3.8 2 .6-.9 1.8-2 3.8-2C16 5 17.7 8.4 16 11.7 13.5 16.3 12 21 12 21z');
    p.setAttribute('fill','#fff');
    svg.appendChild(p);
    svg.style.top=(8+(k*14)%80)+'%';
    svg.style.left=((k*23)%88)+'%';
    svg.style.animationDuration=(9+k*2)+'s';
    svg.style.animationDelay=(-k*1.7)+'s';
    wrap.appendChild(svg);
  }
  return wrap;
}

const els=SLIDES.map((s,i)=>{
  const d=document.createElement('div');
  const theme=s.theme||THEMES[i%THEMES.length];
  d.className='slide theme-'+theme;d.dataset.theme=theme;
  d.appendChild(heartsLayer());
  const inner=document.createElement('div');
  inner.innerHTML=
    (s.eyebrow?`<div class="eyebrow">${s.eyebrow}</div>`:'')+
    (s.title  ?`<div class="title">${s.title}</div>`:'')+
    (s.body   ?`<div class="body">${s.body}</div>`:'')+
    (s.cta    ?`<div class="cta"><span style="font-size:.9em">📞</span><span class="label">${s.cta}</span></div>`:'');
  Array.from(inner.children).forEach(c=>d.appendChild(c));
  stage.appendChild(d);
  return d;
});

let idx=-1;
function show(i){
  els.forEach(e=>e.classList.remove('active'));
  const el=els[i];el.classList.add('active');
  document.getElementById('screen').classList.toggle('on-light', el.dataset.theme==='light');
  const secs=(SLIDES[i].seconds||DEF);
  bar.style.transition='none';bar.style.width='0%';void bar.offsetWidth;
  bar.style.transition=`width ${secs}s linear`;bar.style.width='100%';
  clearTimeout(window.__t);window.__t=setTimeout(next,secs*1000);
}
function next(){idx=(idx+1)%els.length;show(idx);}
next();

document.body.addEventListener('click',()=>{
  if(!document.fullscreenElement&&document.documentElement.requestFullscreen){
    document.documentElement.requestFullscreen().catch(()=>{});
  }
});
</script>
</body>
</html>
